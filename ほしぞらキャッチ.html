<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ほしぞらキャッチ☆</title>
<style>
  :root{
    --sky1:#aeddf5; --sky2:#dcc8f0; --cream:#fff9f2;
    --blue:#5ba8e8; --pink:#f58fb8; --gold:#ffce6b;
    --plum:#5c5470; --cloud:#b9b1cc;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic UI",-apple-system,sans-serif;}
  body{background:linear-gradient(180deg,var(--sky1),var(--sky2));color:var(--plum);
    touch-action:none;user-select:none;-webkit-user-select:none;}
  #wrap{position:relative;width:100%;height:100%;max-width:560px;margin:0 auto;}
  canvas{display:block;width:100%;height:100%;}

  /* ---------- HUD ---------- */
  #hud{position:absolute;top:0;left:0;right:0;padding:10px 12px;display:flex;
    justify-content:space-between;align-items:flex-start;pointer-events:none;}
  .pill{background:rgba(255,249,242,.85);border-radius:999px;padding:6px 14px;
    font-weight:700;font-size:14px;box-shadow:0 2px 8px rgba(92,84,112,.15);}
  #ruleBox{display:flex;flex-direction:column;align-items:center;gap:4px;}
  #ruleStar{font-size:22px;line-height:1;}
  #timeBar{position:absolute;top:0;left:0;height:5px;background:linear-gradient(90deg,var(--gold),var(--pink));
    width:100%;transition:width .3s linear;border-radius:0 3px 3px 0;}

  /* ---------- banner ---------- */
  #banner{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%) scale(0);
    background:rgba(255,249,242,.95);border:3px solid var(--gold);border-radius:24px;
    padding:18px 28px;font-size:20px;font-weight:800;text-align:center;
    box-shadow:0 6px 24px rgba(92,84,112,.25);transition:transform .25s cubic-bezier(.34,1.56,.64,1);
    pointer-events:none;z-index:5;}
  #banner.show{transform:translate(-50%,-50%) scale(1);}

  /* ---------- overlays ---------- */
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:18px;background:linear-gradient(180deg,rgba(174,221,245,.92),rgba(220,200,240,.92));
    text-align:center;padding:24px;z-index:10;}
  .overlay h1{font-size:32px;letter-spacing:.05em;text-shadow:0 2px 0 #fff;}
  .overlay p{font-size:15px;line-height:1.9;}
  .card{background:var(--cream);border-radius:20px;padding:18px 22px;
    box-shadow:0 4px 16px rgba(92,84,112,.18);max-width:330px;}
  button.big{background:linear-gradient(135deg,var(--gold),var(--pink));border:none;color:#fff;
    font-size:19px;font-weight:800;padding:14px 44px;border-radius:999px;cursor:pointer;
    box-shadow:0 4px 14px rgba(245,143,184,.5);font-family:inherit;letter-spacing:.1em;}
  button.big:active{transform:scale(.95);}
  .legend{display:flex;flex-direction:column;gap:8px;font-size:14px;text-align:left;font-weight:700;}
  .legend span{font-size:18px;margin-right:6px;}
  #stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:14px;font-weight:700;}
  #stats div{background:#fff;border-radius:14px;padding:10px;}
  #stats b{display:block;font-size:22px;color:var(--pink);}
  #msg{font-weight:800;font-size:16px;}
  .hidden{display:none !important;}
  /* ---------- records ---------- */
  #recOv{justify-content:flex-start;padding-top:48px;overflow-y:auto;}
  #chart{display:flex;align-items:flex-end;gap:8px;height:140px;width:100%;max-width:330px;
    background:#fff;border-radius:14px;padding:12px 10px 4px;}
  .bar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
  .bar i{display:block;width:70%;border-radius:6px 6px 0 0;
    background:linear-gradient(180deg,var(--gold),var(--pink));min-height:2px;}
  .bar em{font-style:normal;font-size:10px;font-weight:700;margin-top:4px;}
  .bar b{font-size:10px;color:var(--pink);}
  #trend{font-size:14px;font-weight:800;line-height:1.8;}
  .note{font-size:11px;opacity:.75;line-height:1.6;}
  button.sub{background:#fff;border:2px solid var(--pink);color:var(--pink);
    font-weight:800;font-size:14px;padding:8px 22px;border-radius:999px;cursor:pointer;font-family:inherit;}

  #muteBtn{position:absolute;bottom:14px;right:14px;z-index:6;background:rgba(255,249,242,.8);
    border:none;border-radius:50%;width:42px;height:42px;font-size:18px;cursor:pointer;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <div id="timeBar"></div>
  <div id="hud" class="hidden">
    <div class="pill" id="scoreP">⭐ 0</div>
    <div id="ruleBox">
      <div class="pill" style="font-size:12px;">いまのターゲット</div>
      <div class="pill" id="ruleStar">💙</div>
    </div>
    <div class="pill" id="comboP">🔥 0</div>
  </div>
  <div id="banner"></div>
  <button id="muteBtn" class="hidden">🔊</button>

  <!-- start -->
  <div id="startOv" class="overlay">
    <h1>ほしぞらキャッチ☆</h1>
    <div class="card legend">
      <div><span>💙</span>ターゲットの星を <b>キャッチ</b>！</div>
      <div><span>💗</span>ちがう色は <b>よける</b>！</div>
      <div><span>⛈️</span>かみなり雲も <b>よける</b>！</div>
      <div><span>🔄</span>とちゅうでターゲットが <b>チェンジ</b>するよ</div>
    </div>
    <p>画面の <b>左／右</b> をタップして移動（PCは ← → キー）<br>1ラウンド 90秒・むずかしさは自動調整✨</p>
    <button class="big" id="startBtn">スタート！</button>
    <button class="sub" id="recBtn1">📈 きろくを見る</button>
  </div>

  <!-- records -->
  <div id="recOv" class="overlay hidden">
    <h1 style="font-size:24px;">📈 がんばりきろく</h1>
    <div class="card" style="width:100%;">
      <div style="font-size:12px;font-weight:700;margin-bottom:6px;">この7日間の せいかい率（日別平均）</div>
      <div id="chart"></div>
    </div>
    <div class="card" id="trend"></div>
    <p class="note">※ スコアの伸びには「ゲームに慣れた効果」も含まれるよ。<br>毎日だいたい同じ時間帯にやると比べやすい✨</p>
    <button class="big" id="recClose">とじる</button>
  </div>

  <!-- result -->
  <div id="endOv" class="overlay hidden">
    <h1>おつかれさま！</h1>
    <div class="card">
      <div id="stats">
        <div>スコア<b id="rScore">0</b></div>
        <div>せいかい率<b id="rAcc">0%</b></div>
        <div>最大コンボ<b id="rCombo">0</b></div>
        <div>スピードLv<b id="rSpd">1</b></div>
      </div>
    </div>
    <p id="msg"></p>
    <button class="big" id="retryBtn">もう一回！</button>
    <button class="sub" id="recBtn2">📈 きろくを見る</button>
  </div>
</div>

<script>
(() => {
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const wrap = document.getElementById('wrap');
let W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);
function resize(){
  W = wrap.clientWidth; H = wrap.clientHeight;
  cv.width = W*DPR; cv.height = H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
}
resize(); addEventListener('resize', resize);

/* ---------- audio ---------- */
let AC=null, muted=false;
function beep(freq, dur=0.12, type='sine', vol=0.15){
  if(muted) return;
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(), g=AC.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
    o.connect(g).connect(AC.destination); o.start(); o.stop(AC.currentTime+dur);
  }catch(e){}
}
const sCatch=()=>{beep(880,.1);setTimeout(()=>beep(1318,.12),60);};
const sWrong=()=>beep(180,.25,'square',.1);
const sCloud=()=>beep(110,.35,'sawtooth',.08);
const sRule =()=>{beep(659,.1);setTimeout(()=>beep(784,.1),90);setTimeout(()=>beep(988,.15),180);};

/* ---------- state ---------- */
const LANES=3, ROUND=90;
let playing=false, items=[], particles=[], bgStars=[];
let lane=1, laneX=1;            // laneX = smooth position
let target='blue';
let score=0, combo=0, maxCombo=0;
let hits=0, wrongs=0, missed=0;
let recent=[];                  // last judgments for adaptive difficulty
let speedLv=1, speed=1;         // speed multiplier
let tLeft=ROUND, lastT=0, spawnAcc=0, stun=0, shake=0;
let ruleTimes=[60,30];          // remaining-time marks for rule change
let raf=null;

for(let i=0;i<40;i++) bgStars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.6+0.4,tw:Math.random()*6});

const $=id=>document.getElementById(id);
const hud=$('hud'), banner=$('banner');

/* ---------- input ---------- */
function move(dir){ if(!playing||stun>0) return; lane=Math.max(0,Math.min(LANES-1,lane+dir)); }
addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')move(-1);
  if(e.key==='ArrowRight')move(1);
});
wrap.addEventListener('pointerdown',e=>{
  if(!playing) return;
  move(e.clientX - wrap.getBoundingClientRect().left < W/2 ? -1 : 1);
});

/* ---------- helpers ---------- */
const laneCX = i => W*(0.5 + (i-1)*0.28);
function showBanner(html, ms=1500){
  banner.innerHTML=html; banner.classList.add('show');
  setTimeout(()=>banner.classList.remove('show'), ms);
}
function spark(x,y,color,n=10){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, v=Math.random()*3+1;
    particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-1,life:1,color});
  }
}
function judge(ok){
  recent.push(ok?1:0); if(recent.length>10) recent.shift();
  if(recent.length>=8){
    const acc=recent.reduce((a,b)=>a+b,0)/recent.length;
    if(acc>=0.85 && speedLv<8){speedLv++; recent=[]; showBanner('🌈 スピードアップ！ Lv'+speedLv, 1100);}
    else if(acc<=0.5 && speedLv>1){speedLv--; recent=[];}
    speed = 1 + (speedLv-1)*0.22;
  }
}
function updHud(){
  $('scoreP').textContent='⭐ '+score;
  $('comboP').textContent='🔥 '+combo;
  $('ruleStar').textContent = target==='blue'?'💙':'💗';
}

/* ---------- drawing ---------- */
function drawStar(x,y,r,color,rot=0){
  ctx.save();ctx.translate(x,y);ctx.rotate(rot);
  ctx.beginPath();
  for(let i=0;i<10;i++){
    const rr=i%2?r*0.45:r, a=Math.PI/5*i - Math.PI/2;
    ctx[i?'lineTo':'moveTo'](Math.cos(a)*rr,Math.sin(a)*rr);
  }
  ctx.closePath();ctx.fillStyle=color;ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.55)';
  ctx.beginPath();ctx.arc(-r*0.25,-r*0.3,r*0.18,0,7);ctx.fill();
  ctx.restore();
}
function drawCloud(x,y,r){
  ctx.save();ctx.translate(x,y);
  ctx.fillStyle='#b9b1cc';
  [[0,0,r],[ -r*0.8,r*0.15,r*0.7],[r*0.8,r*0.15,r*0.7]].forEach(([cx,cy,cr])=>{
    ctx.beginPath();ctx.arc(cx,cy,cr,0,7);ctx.fill();
  });
  ctx.fillStyle='#ffd84d';
  ctx.beginPath();
  ctx.moveTo(-r*0.1,r*0.5);ctx.lineTo(r*0.25,r*0.5);ctx.lineTo(r*0.05,r*0.95);
  ctx.lineTo(r*0.35,r*0.9);ctx.lineTo(-r*0.15,r*1.5);ctx.lineTo(0,r*1.0);
  ctx.lineTo(-r*0.3,r*1.05);ctx.closePath();ctx.fill();
  ctx.restore();
}
function drawPlayer(x,y,t){
  const bob=Math.sin(t/300)*3;
  ctx.save();ctx.translate(x,y+bob);
  if(stun>0 && Math.floor(t/90)%2) ctx.globalAlpha=0.4;
  // ears
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(-16,-30,9,20,-0.35,0,7);ctx.fill();
  ctx.beginPath();ctx.ellipse(16,-30,9,20,0.35,0,7);ctx.fill();
  ctx.fillStyle='#ffd9e6';
  ctx.beginPath();ctx.ellipse(-16,-28,4.5,12,-0.35,0,7);ctx.fill();
  ctx.beginPath();ctx.ellipse(16,-28,4.5,12,0.35,0,7);ctx.fill();
  // body
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(0,0,26,24,0,0,7);ctx.fill();
  // face
  ctx.strokeStyle='#5c5470';ctx.lineWidth=2.2;ctx.lineCap='round';
  ctx.beginPath();ctx.arc(-8,-2,3.5,0.15*Math.PI,0.85*Math.PI);ctx.stroke();
  ctx.beginPath();ctx.arc(8,-2,3.5,0.15*Math.PI,0.85*Math.PI);ctx.stroke();
  ctx.beginPath();ctx.arc(0,6,3,0.1*Math.PI,0.9*Math.PI);ctx.stroke();
  ctx.fillStyle='rgba(245,143,184,.55)';
  ctx.beginPath();ctx.arc(-14,5,4,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(14,5,4,0,7);ctx.fill();
  ctx.restore();
}

/* ---------- game loop ---------- */
function spawn(){
  const r=Math.random();
  let type;
  if(r<0.42) type=target;
  else if(r<0.80) type=(target==='blue'?'pink':'blue');
  else type='cloud';
  items.push({lane:Math.floor(Math.random()*LANES), y:-40, type, rot:Math.random()*6, hit:false});
}
function loop(t){
  if(!playing) return;
  const dt=Math.min((t-lastT)/1000,0.05); lastT=t;
  tLeft-=dt; stun=Math.max(0,stun-dt); shake*=0.85;
  $('timeBar') && ($('timeBar').style.width=(tLeft/ROUND*100)+'%');

  // rule change
  if(ruleTimes.length && tLeft<=ruleTimes[0]){
    ruleTimes.shift();
    target = target==='blue'?'pink':'blue';
    sRule();
    showBanner('🔄 ルールチェンジ！<br>'+(target==='blue'?'💙 あおい星':'💗 ピンクの星')+' をあつめて！',1700);
    updHud();
  }

  // spawn
  spawnAcc+=dt;
  const interval=Math.max(0.45, 1.05/speed);
  if(spawnAcc>interval){spawnAcc=0;spawn();}

  // physics
  laneX += (lane-laneX)*Math.min(1,dt*14);
  const py=H-110, fall=(H*0.32)*speed;
  for(const it of items){
    it.y+=fall*dt; it.rot+=dt*2;
    if(!it.hit && Math.abs(it.y-py)<34 && it.lane===lane){
      it.hit=true;
      const x=laneCX(it.lane);
      if(it.type==='cloud'){
        stun=1; combo=0; shake=8; sCloud(); spark(x,py,'#b9b1cc',8); judge(false);
      }else if(it.type===target){
        combo++; maxCombo=Math.max(maxCombo,combo); hits++;
        score+=10+Math.min(combo,10); sCatch();
        spark(x,py,it.type==='blue'?'#5ba8e8':'#f58fb8',14); judge(true);
      }else{
        wrongs++; combo=0; score=Math.max(0,score-5); shake=6; sWrong();
        spark(x,py,'#9a92ad',8); judge(false);
      }
      updHud();
    }
  }
  // missed targets
  items=items.filter(it=>{
    if(it.y>H+40){
      if(!it.hit && it.type===target){missed++; combo=0; judge(false); updHud();}
      return false;
    }
    return true;
  });

  /* ----- render ----- */
  ctx.clearRect(0,0,W,H);
  // bg stars
  for(const s of bgStars){
    const a=0.3+0.3*Math.sin(t/700+s.tw);
    ctx.fillStyle=`rgba(255,255,255,${a})`;
    ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,7);ctx.fill();
  }
  ctx.save();
  ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  // lane guides
  ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=2;ctx.setLineDash([4,14]);
  for(let i=0;i<LANES;i++){
    ctx.beginPath();ctx.moveTo(laneCX(i),70);ctx.lineTo(laneCX(i),H);ctx.stroke();
  }
  ctx.setLineDash([]);
  // items
  for(const it of items){
    if(it.hit) continue;
    const x=laneCX(it.lane);
    if(it.type==='cloud') drawCloud(x,it.y,20);
    else drawStar(x,it.y,18,it.type==='blue'?'#5ba8e8':'#f58fb8',it.rot);
  }
  // particles
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life-=0.03;
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,3.2,0,7);ctx.fill();
  }
  ctx.globalAlpha=1;
  drawPlayer(W*(0.5+(laneX-1)*0.28), H-110, t);
  ctx.restore();

  if(tLeft<=0){ endGame(); return; }
  raf=requestAnimationFrame(loop);
}

/* ---------- records (auto-save) ---------- */
let records=[], mem=[], recBack='startOv';
const store={
  async load(){
    try{ if(window.storage){ const r=await window.storage.get('hoshicatch-records');
      if(r&&r.value) return JSON.parse(r.value); } }catch(e){}
    try{ const v=localStorage.getItem('hoshicatch-records');
      if(v) return JSON.parse(v); }catch(e){}
    return mem;
  },
  async save(recs){
    const s=JSON.stringify(recs);
    try{ if(window.storage){ await window.storage.set('hoshicatch-records',s); return; } }catch(e){}
    try{ localStorage.setItem('hoshicatch-records',s); return; }catch(e){}
    mem=recs;
  }
};
store.load().then(r=>{records=Array.isArray(r)?r:[];});

function dayKey(t){const d=new Date(t);return (d.getMonth()+1)+'/'+d.getDate();}
function renderStats(){
  const chart=$('chart'); chart.innerHTML='';
  // last 7 days
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    days.push((d.getMonth()+1)+'/'+d.getDate());
  }
  for(const k of days){
    const rs=records.filter(r=>dayKey(r.t)===k);
    const acc=rs.length?Math.round(rs.reduce((a,r)=>a+r.acc,0)/rs.length):0;
    const bar=document.createElement('div'); bar.className='bar';
    bar.innerHTML=`<b>${rs.length?acc+'%':''}</b><i style="height:${acc}%"></i><em>${k}</em>`;
    chart.appendChild(bar);
  }
  // trend: first 3 vs latest 3 rounds
  const tr=$('trend');
  if(records.length<6){
    tr.innerHTML=`いまの記録：<b style="color:var(--pink)">${records.length}回</b><br>あと${6-records.length}回プレイすると、伸びの判定が出るよ🌱`;
  }else{
    const f=records.slice(0,3), l=records.slice(-3);
    const avg=(a,k)=>a.reduce((s,r)=>s+r[k],0)/a.length;
    const dAcc=Math.round(avg(l,'acc')-avg(f,'acc'));
    const dSpd=(avg(l,'spd')-avg(f,'spd')).toFixed(1);
    const arrow=dAcc>=5?'⬆️ 伸びてる！':dAcc<=-5?'⬇️ お疲れ気味かも':'➡️ 安定キープ';
    tr.innerHTML=`はじめの3回 → 最近の3回<br>せいかい率 <b style="color:var(--pink)">${dAcc>=0?'+':''}${dAcc}%</b> ／ スピードLv <b style="color:var(--pink)">${dSpd>=0?'+':''}${dSpd}</b><br>${arrow}`;
  }
}
function openRec(from){
  recBack=from;
  $(from).classList.add('hidden');
  renderStats();
  $('recOv').classList.remove('hidden');
}
$('recBtn1').onclick=()=>openRec('startOv');
$('recBtn2').onclick=()=>openRec('endOv');
$('recClose').onclick=()=>{
  $('recOv').classList.add('hidden');
  $(recBack).classList.remove('hidden');
};

/* ---------- start / end ---------- */
function startGame(){
  items=[];particles=[];lane=1;laneX=1;target='blue';
  score=0;combo=0;maxCombo=0;hits=0;wrongs=0;missed=0;recent=[];
  speedLv=1;speed=1;tLeft=ROUND;spawnAcc=0;stun=0;shake=0;
  ruleTimes=[60,30];
  $('startOv').classList.add('hidden');
  $('endOv').classList.add('hidden');
  hud.classList.remove('hidden');
  $('muteBtn').classList.remove('hidden');
  updHud();
  showBanner('💙 あおい星をあつめて！',1400);
  playing=true; lastT=performance.now();
  raf=requestAnimationFrame(loop);
}
function endGame(){
  playing=false; cancelAnimationFrame(raf);
  hud.classList.add('hidden');
  const total=hits+wrongs+missed;
  const acc=total? Math.round(hits/total*100):0;
  records.push({t:Date.now(), score, acc, combo:maxCombo, spd:speedLv});
  if(records.length>200) records=records.slice(-200);
  store.save(records);
  $('rScore').textContent=score;
  $('rAcc').textContent=acc+'%';
  $('rCombo').textContent=maxCombo;
  $('rSpd').textContent=speedLv;
  $('msg').textContent =
    acc>=85?'すごい集中力…！⭐ きょうのベストだね':
    acc>=65?'いいかんじ！🌙 毎日ちょっとずつ続けるのがコツだよ':
    'むずかしかった？大丈夫、続けるほど慣れていくよ☁️';
  $('endOv').classList.remove('hidden');
}
$('startBtn').onclick=startGame;
$('retryBtn').onclick=startGame;
$('muteBtn').onclick=e=>{muted=!muted;e.target.textContent=muted?'🔇':'🔊';};
})();
</script>
</body>
